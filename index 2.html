<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ascend</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-top: #fff6ec;
    --bg-mid: #f5ede3;
    --bg-bottom: #e8e2da;
    --fire: #e8470a;
    --fire-deep: #b8350a;
    --fire-glow: rgba(232, 71, 10, 0.18);
    --hole: #5a5550;
    --hole-deep: #3a3530;
    --ink: #211d18;
    --muted: #a09a92;
    --paper: #fffaf3;
    --border: #e0d8cd;
  }

  html, body {
    height: 100%;
    background: var(--bg-mid);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
    position: relative;
    overflow-x: hidden;
  }

  /* Atmospheric rising embers */
  .ember {
    position: fixed;
    bottom: -10px;
    width: 3px;
    height: 3px;
    background: var(--fire);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }

  /* HEADER */
  header {
    padding: 22px 22px 8px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    z-index: 2;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 19px;
    letter-spacing: -0.01em;
    font-style: italic;
  }

  .streak-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--fire-deep);
    background: var(--fire-glow);
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid rgba(232,71,10,0.2);
  }

  .streak-pill .flame { font-size: 13px; }

  /* THE VERTICAL ARENA */
  .arena {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
    padding: 0 22px;
  }

  .pole-label {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    letter-spacing: 0.02em;
  }

  .pole-label.high {
    color: var(--fire);
    font-size: 13px;
    font-weight: 600;
    padding-top: 6px;
  }

  .pole-label.low {
    color: var(--hole);
    font-size: 13px;
    font-weight: 600;
    padding-bottom: 6px;
  }

  /* THE BIG NUMBER TENSION */
  .tension {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    position: relative;
    min-height: 260px;
  }

  .big-num {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    line-height: 0.85;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-num.high {
    font-size: 96px;
    color: var(--fire);
    text-shadow: 0 8px 40px var(--fire-glow);
  }

  .big-num.low {
    font-size: 72px;
    color: var(--hole);
    opacity: 0.85;
  }

  .vs-line {
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 14px 0;
    position: relative;
  }

  .vs-line::after {
    content: 'VS';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-mid);
    padding: 0 10px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  .num-cap {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* MOMENTUM METER (vertical) */
  .momentum {
    position: absolute;
    right: 4px;
    top: 10%;
    bottom: 10%;
    width: 5px;
    background: linear-gradient(180deg, var(--hole-deep), var(--bg-mid) 50%, var(--bg-mid));
    border-radius: 3px;
    overflow: hidden;
  }

  .momentum-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, var(--fire), var(--fire-deep));
    border-radius: 3px;
    transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 12px var(--fire);
  }

  /* VERDICT */
  .verdict {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    padding: 6px 0 2px;
    transition: color 0.4s;
  }

  .verdict.rising { color: var(--fire); }
  .verdict.sinking { color: var(--hole); }
  .verdict.level { color: var(--muted); }

  .last-checkin {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    padding-bottom: 6px;
  }

  /* INPUT DOCK */
  .dock {
    z-index: 3;
    background: var(--paper);
    border-top: 1px solid var(--border);
    border-radius: 22px 22px 0 0;
    padding: 16px 18px 22px;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.04);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 100px;
  }

  textarea::placeholder { color: var(--muted); }

  .dock-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  /* BIG MIC TOGGLE */
  .mic-toggle {
    flex: 1;
    height: 52px;
    border: none;
    border-radius: 14px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .mic-toggle:active { transform: scale(0.98); }

  .mic-toggle.listening {
    background: var(--fire);
    color: #fff;
  }

  .mic-toggle.listening::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.25), transparent 70%);
    animation: breathe 1.4s ease infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .mic-toggle .mic-svg { width: 18px; height: 18px; fill: currentColor; z-index: 1; }
  .mic-toggle .txt { z-index: 1; }

  /* SOUND BARS when listening */
  .bars { display: none; gap: 3px; align-items: center; height: 18px; z-index: 1; }
  .mic-toggle.listening .bars { display: flex; }
  .mic-toggle.listening .mic-svg { display: none; }
  .bars span {
    width: 3px;
    background: #fff;
    border-radius: 2px;
    animation: bar 0.8s ease infinite;
  }
  .bars span:nth-child(1){ height: 8px; animation-delay: 0s; }
  .bars span:nth-child(2){ height: 16px; animation-delay: 0.15s; }
  .bars span:nth-child(3){ height: 11px; animation-delay: 0.3s; }
  .bars span:nth-child(4){ height: 18px; animation-delay: 0.45s; }
  .bars span:nth-child(5){ height: 9px; animation-delay: 0.6s; }
  @keyframes bar { 0%,100%{ transform: scaleY(0.4); } 50%{ transform: scaleY(1); } }

  .score-btn {
    height: 52px;
    padding: 0 22px;
    border: none;
    border-radius: 14px;
    background: var(--fire);
    color: #fff;
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-style: italic;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .score-btn:active { transform: scale(0.97); }
  .score-btn:disabled { opacity: 0.3; }

  /* LOG TOGGLE */
  .log-toggle {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    padding: 12px 0 2px;
    cursor: pointer;
    text-transform: uppercase;
  }

  /* LOG DRAWER */
  .log-drawer {
    position: fixed;
    inset: 0;
    background: var(--bg-mid);
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    padding: 22px;
  }

  .log-drawer.open { transform: translateY(0); }

  .log-drawer-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .log-drawer-head h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 22px;
  }

  .close-log {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
  }

  .log-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

  .log-entry {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 15px;
  }

  .log-entry-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 9px;
  }

  .log-entry-date { font-size: 10px; color: var(--muted); }
  .log-entry-score { font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px; }
  .log-entry-score .p { color: var(--fire); }
  .log-entry-score .n { color: var(--hole); }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { font-size: 10px; padding: 3px 9px; border-radius: 20px; }
  .chip.pos { background: var(--fire-glow); color: var(--fire-deep); }
  .chip.neg { background: rgba(90,85,80,0.1); color: var(--hole); }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 12px;
  }

  .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 40px 0; }

  /* LOADING */
  .loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(245,237,227,0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  .loading.active { display: flex; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--fire); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--muted); }

  .no-voice-note { font-size: 10px; color: var(--muted); text-align: center; padding-top: 8px; display: none; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Weighing your choices...</div>
</div>

<header>
  <h1>Ascend</h1>
  <div class="streak-pill"><span class="flame">🔥</span><span id="streakNum">0</span> day streak</div>
</header>

<div class="arena">
  <div class="pole-label high">↑ go high</div>

  <div class="tension">
    <div class="big-num high" id="posScore">0</div>
    <div class="num-cap">fire</div>

    <div class="vs-line"></div>

    <div class="num-cap">hole</div>
    <div class="big-num low" id="negScore">0</div>

    <div class="momentum">
      <div class="momentum-fill" id="momentumFill" style="height:50%"></div>
    </div>
  </div>

  <div class="pole-label low">↓ go low</div>

  <div class="verdict level" id="verdict">Even</div>
  <div class="last-checkin" id="lastCheckin">No check-ins yet</div>
</div>

<div class="dock">
  <textarea id="dayInput" placeholder="Speak or type your day..." rows="1"></textarea>
  <div class="dock-controls">
    <button class="mic-toggle" id="micToggle" onclick="toggleVoice()">
      <svg class="mic-svg" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 18.93V22h2v-2.07A8.001 8.001 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8.001 8.001 0 0 0 7 7.93z"/></svg>
      <div class="bars"><span></span><span></span><span></span><span></span><span></span></div>
      <span class="txt" id="micTxt">Hold the day</span>
    </button>
    <button class="score-btn" id="scoreBtn" onclick="submitDay()">Score</button>
  </div>
  <div class="log-toggle" onclick="openLog()">View the climb ↗</div>
  <div class="no-voice-note" id="noVoiceNote">Voice needs HTTPS — works once hosted online.</div>
</div>

<div class="log-drawer" id="logDrawer">
  <div class="log-drawer-head">
    <h2>The Climb</h2>
    <button class="close-log" onclick="closeLog()">×</button>
  </div>
  <div class="log-list" id="logList"></div>
  <button class="reset-btn" onclick="resetAll()">Reset everything</button>
</div>

<script>
const STORAGE_KEY = 'ascend_scoreboard_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { totalPos: 8, totalNeg: 4, entries: [], streak: 0, lastDay: null };
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function dayKey(date) { return date.toISOString().slice(0,10); }

function updateStreak(data) {
  const today = dayKey(new Date());
  if (data.lastDay === today) return data;
  const yesterday = dayKey(new Date(Date.now() - 86400000));
  if (data.lastDay === yesterday) data.streak += 1;
  else if (data.lastDay === null) data.streak = 1;
  else data.streak = 1;
  data.lastDay = today;
  return data;
}

function timeSince(data) {
  if (!data.entries.length) return 'No check-ins yet';
  const last = data.entries[data.entries.length - 1].ts;
  if (!last) return '';
  const hrs = Math.floor((Date.now() - last) / 3600000);
  if (hrs < 1) return 'Last check-in: just now';
  if (hrs === 1) return 'Last check-in: 1 hour ago';
  if (hrs < 24) return `Last check-in: ${hrs} hours ago`;
  const days = Math.floor(hrs/24);
  return `Last check-in: ${days} day${days>1?'s':''} ago`;
}

function updateUI() {
  const data = loadData();
  document.getElementById('posScore').textContent = data.totalPos;
  document.getElementById('negScore').textContent = data.totalNeg;
  document.getElementById('streakNum').textContent = data.streak;

  const total = data.totalPos + data.totalNeg;
  const pct = total === 0 ? 50 : Math.round((data.totalPos/total)*100);
  document.getElementById('momentumFill').style.height = pct + '%';

  const v = document.getElementById('verdict');
  if (data.totalPos > data.totalNeg) { v.textContent = 'Rising'; v.className = 'verdict rising'; }
  else if (data.totalNeg > data.totalPos) { v.textContent = 'Sinking'; v.className = 'verdict sinking'; }
  else { v.textContent = 'Even'; v.className = 'verdict level'; }

  document.getElementById('lastCheckin').textContent = timeSince(data);
  renderLog(data);
}

function renderLog(data) {
  const list = document.getElementById('logList');
  if (!data.entries.length) { list.innerHTML = '<div class="empty">Your climb starts with the first word.</div>'; return; }
  list.innerHTML = '';
  [...data.entries].reverse().forEach(e => {
    const el = document.createElement('div');
    el.className = 'log-entry';
    const pc = e.positive.map(i=>`<span class="chip pos">${i}</span>`).join('');
    const nc = e.negative.map(i=>`<span class="chip neg">${i}</span>`).join('');
    el.innerHTML = `<div class="log-entry-head"><span class="log-entry-date">${e.date}</span><span class="log-entry-score"><span class="p">🔥${e.positive.length}</span> · <span class="n">${e.negative.length}🕳️</span></span></div><div class="chips">${pc}${nc}</div>`;
    list.appendChild(el);
  });
}

function openLog(){ document.getElementById('logDrawer').classList.add('open'); }
function closeLog(){ document.getElementById('logDrawer').classList.remove('open'); }

/* ---- VOICE: real toggle, stays on until tapped ---- */
let recognition = null, isListening = false, finalTranscript = '';

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('noVoiceNote').style.display = 'block';
    return;
  }
  recognition = new SR();
  recognition.continuous = true;      // keep going
  recognition.interimResults = true;
  recognition.lang = 'et-EE';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += t + ' ';
      else interim += t;
    }
    document.getElementById('dayInput').value = (finalTranscript + interim).trim();
  };

  // Auto-restart if it drops while we still want to listen (fixes "stops after a second")
  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch(_) {}
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      isListening = false;
      setMicUI(false);
      alert('Microphone blocked. Allow mic access, and make sure the page is opened over https (hosted), not as a local file.');
    }
  };
}

function setMicUI(on) {
  const btn = document.getElementById('micToggle');
  const txt = document.getElementById('micTxt');
  if (on) { btn.classList.add('listening'); txt.textContent = 'Listening — tap to stop'; }
  else { btn.classList.remove('listening'); txt.textContent = 'Hold the day'; }
}

let micGranted = false;

async function ensureMicPermission() {
  if (micGranted) return true;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    // Old browser — let SpeechRecognition try to prompt on its own
    return true;
  }
  try {
    // This call triggers the phone's "Allow microphone?" dialog
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop()); // release mic right away
    micGranted = true;
    return true;
  } catch (err) {
    alert('Mikrofoni luba on vajalik. Luba see brauseri seadetes ja proovi uuesti. (Veendu ka, et leht on avatud https-aadressil, mitte kohaliku failina.)');
    return false;
  }
}

async function toggleVoice() {
  if (!recognition) {
    alert('Voice not supported here. Type instead, or open the hosted https version.');
    return;
  }
  if (isListening) {
    isListening = false;
    recognition.stop();
    setMicUI(false);
  } else {
    const ok = await ensureMicPermission();
    if (!ok) return;
    finalTranscript = document.getElementById('dayInput').value ? document.getElementById('dayInput').value + ' ' : '';
    isListening = true;
    try { recognition.start(); setMicUI(true); }
    catch(_) { isListening = false; setMicUI(false); }
  }
}

/* ---- SUBMIT ---- */
async function submitDay() {
  const input = document.getElementById('dayInput');
  const text = input.value.trim();
  if (!text) return;
  if (isListening) { isListening = false; recognition.stop(); setMicUI(false); }

  const btn = document.getElementById('scoreBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('active');

  let data = loadData();
  const sys = `You are a scoreboard keeper. The user describes their day in English, Estonian, or mixed language.
Extract positive choices (training, exercise, walking, movement, clean meal, healthy food, good sleep, focused work, progress on important work, being present in relationship, showing love, emotional control, discipline, resisting temptation, hygiene, stretching, washing) and negative choices (junk food, smoking, nicotine, drugs, weed, gambling, impulsive financial decisions, unnecessary alcohol, skipping training, inactivity, doomscrolling, procrastination, impulsive decisions, uncontrolled emotional reactions, avoidance, comfort over responsibility).
Count each occurrence separately. Use short English labels (2-3 words).
Respond ONLY with valid JSON, no markdown: {"positive":["x"],"negative":["y"]}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: sys,
        messages: [{ role: "user", content: text }]
      })
    });
    const json = await res.json();
    const raw = json.content.map(b => b.text || '').join('');
    const result = JSON.parse(raw.replace(/```json|```/g,'').trim());
    const pos = result.positive || [], neg = result.negative || [];

    data.totalPos += pos.length;
    data.totalNeg += neg.length;
    data = updateStreak(data);

    const now = new Date();
    data.entries.push({
      date: now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}),
      ts: now.getTime(),
      positive: pos, negative: neg
    });
    saveData(data);
    updateUI();
    input.value = '';
    finalTranscript = '';
  } catch (err) {
    alert('Could not reach Claude. Check your connection.');
    console.error(err);
  } finally {
    btn.disabled = false;
    document.getElementById('loading').classList.remove('active');
  }
}

function resetAll() {
  if (confirm('Reset everything? Your climb resets to zero.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

/* Embers */
function spawnEmbers() {
  for (let i = 0; i < 8; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    e.style.left = Math.random()*100 + 'vw';
    e.style.animation = `rise ${6+Math.random()*6}s linear ${Math.random()*8}s infinite`;
    document.body.appendChild(e);
  }
}

/* auto-grow textarea */
document.getElementById('dayInput').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

initVoice();
spawnEmbers();
updateUI();
</script>
</body>
</html>
